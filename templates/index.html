<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeszyt Online</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/3.1.3/socket.io.min.js"></script>
    <style>
        canvas {
            border: 1px solid black;
            cursor: crosshair;
        }
    </style>
</head>
<body>
    <h1>Rysuj na zeszycie!</h1>
    <canvas id="drawingCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('drawingCanvas');
        const context = canvas.getContext('2d');
        const socket = io(); // Połączenie z serwerem

        let drawing = false;
        let lastX = 0; // Zmienna do przechowywania poprzedniego X
        let lastY = 0; // Zmienna do przechowywania poprzedniego Y
        const strokeColor = "black"; // Kolor rysowania
        const strokeWidth = 2; // Grubość linii

        canvas.addEventListener('mousedown', (e) => {
            drawing = true;
            [lastX, lastY] = [e.offsetX, e.offsetY]; // Ustawienie pozycji startowej
        });

        canvas.addEventListener('mouseup', () => {
            drawing = false;
            context.beginPath(); // Zakończenie rysowania
        });

        canvas.addEventListener('mousemove', draw);

        function draw(e) {
            if (!drawing) return;

            context.lineWidth = strokeWidth; // Ustawienie grubości linii
            context.strokeStyle = strokeColor; // Ustawienie koloru
            context.lineCap = 'round'; // Zaokrąglone końce linii
            context.beginPath(); // Rozpoczęcie nowej ścieżki
            context.moveTo(lastX, lastY); // Przesunięcie do ostatniej pozycji
            context.lineTo(e.offsetX, e.offsetY); // Rysowanie linii do aktualnej pozycji
            context.stroke(); // Wykonanie rysunku
            [lastX, lastY] = [e.offsetX, e.offsetY]; // Zaktualizowanie ostatnich współrzędnych

            // Wyślij dane rysunku do serwera
            socket.emit('draw_line', {
                x0: lastX,
                y0: lastY,
                x1: e.offsetX,
                y1: e.offsetY,
                color: strokeColor,
                width: strokeWidth
            });
        }

        // Odbieranie rysunków od innych klientów
        socket.on('draw_line', function(data) {
            context.lineWidth = data.width; // Ustawienie grubości linii
            context.strokeStyle = data.color; // Ustawienie koloru
            context.lineCap = 'round'; // Zaokrąglone końce linii
            context.beginPath(); // Rozpoczęcie nowej ścieżki
            context.moveTo(data.x0, data.y0); // Przesunięcie do współrzędnych nadawcy
            context.lineTo(data.x1, data.y1); // Rysowanie linii do aktualnych współrzędnych
            context.stroke(); // Wykonanie rysunku
        });
    </script>
</body>
</html>
